name: Build and publish HTML artifact

on:
  push:
    branches:
      - '**'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pull-requests: write

concurrency:
  group: build-artifact-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-upload:
    name: Build dist/index.html and upload artifact
    runs-on: ubuntu-latest

    outputs:
      artifact_url: ${{ steps.meta.outputs.artifact_url }}
      artifact_name: ${{ steps.meta.outputs.artifact_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Upload HTML artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: dist-index-html-${{ github.run_number }}-${{ github.run_attempt }}
          path: dist/index.html
          if-no-files-found: error
          retention-days: 14

      - name: Build artifact metadata
        id: meta
        env:
          ARTIFACT_ID: ${{ steps.upload.outputs.artifact-id }}
        run: |
          artifact_name="dist-index-html-${{ github.run_number }}-${{ github.run_attempt }}"
          artifact_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/${ARTIFACT_ID}"

          {
            echo "artifact_name=${artifact_name}"
            echo "artifact_url=${artifact_url}"
          } >> "$GITHUB_OUTPUT"

      - name: Add artifact link to run summary
        run: |
          echo "### Build artifact" >> "$GITHUB_STEP_SUMMARY"
          echo "- HTML artifact: [${{ steps.meta.outputs.artifact_name }}](${{ steps.meta.outputs.artifact_url }})" >> "$GITHUB_STEP_SUMMARY"

      - name: Add artifact link to logs notice
        run: echo "::notice title=Build artifact::${{ steps.meta.outputs.artifact_url }}"

  comment-artifact-link:
    name: Comment artifact permalink on PR
    runs-on: ubuntu-latest
    needs: build-and-upload
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'push' }}

    steps:
      - name: Find PR number for push events
        id: pr_for_push
        if: ${{ github.event_name == 'push' }}
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${branch}`,
              per_page: 1,
            });

            if (prs.length > 0) {
              core.setOutput('number', String(prs[0].number));
            }

      - name: Determine PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ steps.pr_for_push.outputs.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upsert PR comment with artifact permalink
        if: ${{ steps.pr.outputs.number != '' }}
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          ARTIFACT_URL: ${{ needs.build-and-upload.outputs.artifact_url }}
          ARTIFACT_NAME: ${{ needs.build-and-upload.outputs.artifact_name }}
        with:
          script: |
            const marker = '<!-- cliterface-build-artifact-link -->';
            const body = `${marker}
            ✅ Build artifact for \\`${context.sha.slice(0, 7)}\\`:

            - [${process.env.ARTIFACT_NAME}](${process.env.ARTIFACT_URL})

            _Workflow run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}_`;

            const issue_number = Number(process.env.PR_NUMBER);
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(
              (c) => c.user?.type === 'Bot' && c.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }
