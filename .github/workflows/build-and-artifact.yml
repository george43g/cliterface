name: Build and publish HTML artifact

on:
  push:
    branches:
      - '**'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  issues: write
  pull-requests: write

concurrency:
  group: build-artifact-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TOOL_SCREENSHOT_DIR: .agent-artifacts/tool-screenshots

jobs:
  build-and-upload:
    name: Build dist/index.html and upload artifacts
    runs-on: ubuntu-latest

    outputs:
      html_artifact_name: ${{ steps.meta.outputs.html_artifact_name }}
      html_artifact_url: ${{ steps.meta.outputs.html_artifact_url }}
      screenshot_artifact_name: ${{ steps.meta.outputs.screenshot_artifact_name }}
      screenshot_artifact_url: ${{ steps.meta.outputs.screenshot_artifact_url }}
      screenshot_embed_markdown: ${{ steps.meta.outputs.screenshot_embed_markdown }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Ensure tool screenshot directory exists
        run: mkdir -p "${TOOL_SCREENSHOT_DIR}"

      - name: Upload HTML artifact
        id: upload_html
        uses: actions/upload-artifact@v6
        with:
          name: dist-index-html-${{ github.run_number }}-${{ github.run_attempt }}
          path: dist/index.html
          if-no-files-found: error
          retention-days: 14

      - name: Upload tool screenshot artifacts
        id: upload_screenshot
        uses: actions/upload-artifact@v6
        with:
          name: tool-screenshots-${{ github.run_number }}-${{ github.run_attempt }}
          path: ${{ env.TOOL_SCREENSHOT_DIR }}
          if-no-files-found: warn
          retention-days: 14

      - name: Build artifact metadata
        id: meta
        env:
          HTML_ARTIFACT_ID: ${{ steps.upload_html.outputs.artifact-id }}
          SCREENSHOT_ARTIFACT_ID: ${{ steps.upload_screenshot.outputs.artifact-id }}
        run: |
          html_artifact_name="dist-index-html-${{ github.run_number }}-${{ github.run_attempt }}"
          screenshot_artifact_name="tool-screenshots-${{ github.run_number }}-${{ github.run_attempt }}"

          html_artifact_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/${HTML_ARTIFACT_ID}"

          screenshot_artifact_url=""
          screenshot_embed_markdown=""
          if [ -n "${SCREENSHOT_ARTIFACT_ID}" ]; then
            screenshot_artifact_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/${SCREENSHOT_ARTIFACT_ID}"
            screenshot_embed_markdown="![Tool screenshot artifact](${screenshot_artifact_url})"
          fi

          {
            echo "html_artifact_name=${html_artifact_name}"
            echo "html_artifact_url=${html_artifact_url}"
            echo "screenshot_artifact_name=${screenshot_artifact_name}"
            echo "screenshot_artifact_url=${screenshot_artifact_url}"
            echo "screenshot_embed_markdown=${screenshot_embed_markdown}"
          } >> "$GITHUB_OUTPUT"

      - name: Add artifact links to run summary
        run: |
          echo "### Build artifacts" >> "$GITHUB_STEP_SUMMARY"
          echo "- HTML: [${{ steps.meta.outputs.html_artifact_name }}](${{ steps.meta.outputs.html_artifact_url }})" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${{ steps.meta.outputs.screenshot_artifact_url }}" ]; then
            echo "- Tool screenshots: [${{ steps.meta.outputs.screenshot_artifact_name }}](${{ steps.meta.outputs.screenshot_artifact_url }})" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Tool screenshots: none found in \`${TOOL_SCREENSHOT_DIR}\` for this run" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Add artifact links to logs notice
        run: |
          echo "::notice title=HTML artifact::${{ steps.meta.outputs.html_artifact_url }}"
          if [ -n "${{ steps.meta.outputs.screenshot_artifact_url }}" ]; then
            echo "::notice title=Tool screenshots artifact::${{ steps.meta.outputs.screenshot_artifact_url }}"
          else
            echo "::notice title=Tool screenshots artifact::No screenshots found in ${TOOL_SCREENSHOT_DIR}"
          fi

  comment-artifact-links:
    name: Comment artifact permalinks on PR
    runs-on: ubuntu-latest
    needs: build-and-upload
    if: ${{ github.event_name == 'push' || (github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork) }}

    steps:
      - name: Find PR number for push events
        id: pr_for_push
        if: ${{ github.event_name == 'push' }}
        uses: actions/github-script@v8
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${branch}`,
              per_page: 1,
            });

            if (prs.length > 0) {
              core.setOutput('number', String(prs[0].number));
            }

      - name: Determine PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ steps.pr_for_push.outputs.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upsert PR comment with artifact permalinks
        if: ${{ steps.pr.outputs.number != '' }}
        uses: actions/github-script@v8
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          HTML_ARTIFACT_URL: ${{ needs.build-and-upload.outputs.html_artifact_url }}
          HTML_ARTIFACT_NAME: ${{ needs.build-and-upload.outputs.html_artifact_name }}
          SCREENSHOT_ARTIFACT_URL: ${{ needs.build-and-upload.outputs.screenshot_artifact_url }}
          SCREENSHOT_ARTIFACT_NAME: ${{ needs.build-and-upload.outputs.screenshot_artifact_name }}
          SCREENSHOT_EMBED_MARKDOWN: ${{ needs.build-and-upload.outputs.screenshot_embed_markdown }}
        with:
          script: |
            const marker = '<!-- cliterface-build-artifact-links -->';
            const screenshotSection = process.env.SCREENSHOT_ARTIFACT_URL
              ? `- Tool screenshots: [${process.env.SCREENSHOT_ARTIFACT_NAME}](${process.env.SCREENSHOT_ARTIFACT_URL})\n\n${process.env.SCREENSHOT_EMBED_MARKDOWN}\n\n> If GitHub does not render the image inline, use the artifact link above.`
              : `- Tool screenshots: none found in \`${process.env.TOOL_SCREENSHOT_DIR || '.agent-artifacts/tool-screenshots'}\` for this run`;

            const body = `${marker}
            ✅ Build artifacts for \`${context.sha.slice(0, 7)}\`:

            - HTML: [${process.env.HTML_ARTIFACT_NAME}](${process.env.HTML_ARTIFACT_URL})
            ${screenshotSection}

            _Workflow run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}_`;

            const issue_number = Number(process.env.PR_NUMBER);
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(
              (c) => c.user?.type === 'Bot' && c.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }
